services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-linklanka_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-linklanka_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      TTS_MAX_CONCURRENCY: ${TTS_MAX_CONCURRENCY:-2}
      GEMINI_TRANSLATION_MODEL: ${GEMINI_TRANSLATION_MODEL:-gemini-3-flash-preview}
      GEMINI_TRANSLATION_FALLBACK_MODEL: ${GEMINI_TRANSLATION_FALLBACK_MODEL:-gemini-2.5-flash}
      TRANSLATION_MODEL_MAX_RETRIES: ${TRANSLATION_MODEL_MAX_RETRIES:-1}
      TRANSLATION_TIMEOUT_MS_TEXT: ${TRANSLATION_TIMEOUT_MS_TEXT:-30000}
      TRANSLATION_TIMEOUT_MS_MEDIA: ${TRANSLATION_TIMEOUT_MS_MEDIA:-60000}
      TTS_MANDATORY_ENGLISH_RETRIES: ${TTS_MANDATORY_ENGLISH_RETRIES:-1}
      DOMINANT_LANGUAGE_LOW_CONFIDENCE_THRESHOLD: ${DOMINANT_LANGUAGE_LOW_CONFIDENCE_THRESHOLD:-65}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?Set AWS_S3_BUCKET in .env}
      AWS_S3_REGION: ${AWS_S3_REGION:-ap-south-1}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-linklanka/}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?Set AWS_ACCESS_KEY_ID in .env}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?Set AWS_SECRET_ACCESS_KEY in .env}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-linklanka_admin}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-linklanka_db}
      DB_SSL: ${DB_SSL:-false}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - api_uploads:/app/apps/api/uploads
    depends_on:
      - postgres

volumes:
  pgdata:
  api_uploads: